name: CI Build (FastReport .NET 8/9)

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

  # =========================
  # Manual trigger (GitHub UI)
  # =========================
  workflow_dispatch:
    inputs:
      configuration:
        description: "Build configuration"
        required: false
        default: "Release"
        type: choice
        options:
          - Debug
          - Release

      run_tests:
        description: "Run unit tests"
        required: false
        default: true
        type: boolean

      dotnet_version:
        description: "Override .NET version (optional)"
        required: false
        default: ""
        type: string

env:
  CONFIGURATION: ${{ inputs.configuration || 'Release' }}

jobs:
  build-test:
    name: Build & Test (.NET ${{ matrix.dotnet }})
    runs-on: windows-latest

    strategy:
      fail-fast: false
      matrix:
        dotnet: [ "8.0.x", "9.0.x" ]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # =========================
      # Conditional SDK selection
      # (manual override supported)
      # =========================
      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ inputs.dotnet_version != '' && inputs.dotnet_version || matrix.dotnet }}

      - name: Show .NET info
        run: dotnet --info

      - name: Install workloads
        run: dotnet workload install windowsdesktop

      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ matrix.dotnet }}-${{ hashFiles('**/*.csproj', '**/packages.lock.json') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore
        run: dotnet restore --locked-mode

      - name: Build solution
        run: dotnet build FastReport.sln -c ${{ env.CONFIGURATION }} --no-restore

      # =========================
      # Optional test execution
      # =========================
      - name: Run tests
        if: ${{ inputs.run_tests }}
        run: |
          dotnet test FastReport.sln ^
            -c ${{ env.CONFIGURATION }} ^
            --no-build ^
            --logger "trx;LogFileName=test-results.trx" ^
            --results-directory ./TestResults

      - name: Upload test results
        if: always() && inputs.run_tests
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.dotnet }}
          path: TestResults

      - name: Publish artifacts
        run: |
          dotnet publish FastReport/FastReport.csproj ^
            -c ${{ env.CONFIGURATION }} ^
            -o ./publish/net${{ matrix.dotnet }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fastreport-${{ matrix.dotnet }}
          path: publish/net${{ matrix.dotnet }}

  pack:
    name: Pack NuGet (manual-safe)
    runs-on: windows-latest
    needs: build-test

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Restore
        run: dotnet restore

      - name: Pack
        run: |
          dotnet pack FastReport.sln ^
            -c Release ^
            -o ./nupkgs ^
            --no-build

      - name: Upload packages
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: nupkgs
